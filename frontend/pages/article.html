<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — AutoGuide Maroc</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .article-container {
      max-width: 800px;
      margin: 40px auto 80px;
      padding: 0 24px;
    }
    .article-header {
      margin-bottom: 32px;
      text-align: center;
    }
    .article-meta {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 16px;
      font-weight: 500;
    }
    .article-tag {
      padding: 4px 12px;
      border-radius: 100px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .article-title {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--secondary);
      letter-spacing: -1px;
      margin-bottom: 24px;
    }
    .article-hero-image {
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: cover;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      margin-bottom: 40px;
    }
    .article-body {
      font-size: 18px;
      line-height: 1.8;
      color: #334155;
    }
    .article-body p {
      margin-bottom: 24px;
    }
    .article-body h2 {
      font-size: 26px;
      font-weight: 800;
      color: var(--secondary);
      margin: 40px 0 16px;
      letter-spacing: -0.5px;
    }
    .article-body h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--secondary);
      margin: 32px 0 12px;
    }
    .article-body ul, .article-body ol {
      margin-bottom: 24px;
      padding-left: 24px;
    }
    .article-body li {
      margin-bottom: 8px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 32px;
      transition: var(--transition);
    }
    .back-btn:hover {
      transform: translateX(-4px);
    }
  </style>
</head>
<body data-page="article">
  <header class="header">
    <div class="container">
      <div class="header-top">
        <a href="/" class="logo">
          <img src="../images/logo.png" alt="AutoGuide Maroc Logo" class="logo-img">
          <span class="logo-text">AutoGuide<span class="logo-accent">Maroc</span></span>
        </a>
        <nav class="nav-main">
          <a href="/" class="nav-link">Accueil</a>
          <a href="marques.html" class="nav-link">Marques</a>
          <a href="comparateur.html" class="nav-link">Comparateur</a>
          <a href="promos.html" class="nav-link">Promos</a>
          <a href="actu.html" class="nav-link active">Actu</a>
          <a href="analyse.html" class="nav-link">Analyse</a>
          <a href="wallpapers.html" class="nav-link">Wallpapers</a>
        </nav>
        <a href="comparateur.html" class="nav-cta">Comparer</a>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="article-container" id="articleContainer">
      <a href="actu.html" class="back-btn">← Retour aux actualités</a>
      <div class="skeleton" style="height:40px;width:80%;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:20px;width:30%;margin-bottom:32px;"></div>
      <div class="skeleton" style="height:400px;border-radius:24px;margin-bottom:40px;"></div>
      <div class="skeleton" style="height:20px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:20px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:20px;width:60%;"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0;">
        <p>© 2026 AutoGuide Maroc</p>
      </div>
    </div>
  </footer>

  <script src="../js/config.js?v=2"></script>
  <script src="../js/data.js?v=2"></script>
  <script src="../js/app.js?v=2"></script>
</body>
</html>
